<app-menu></app-menu>

<div class="container mt-4">
  <h2>Crear Presupuesto</h2>

  <input
    type="number"
    [(ngModel)]="presupuesto"
    class="form-control mb-2"
    min="1"
    step="1"
    placeholder="Ej: 150000"
  >

  <button class="btn btn-primary" (click)="guardarPresupuesto()">
    Guardar
  </button>

  <div *ngIf="error" class="alert alert-danger mt-2">
    El presupuesto debe ser mayor a 0
  </div>
</div>
