<div class="login-page">
  <div class="login-card">
    <h1>Acceso Presupuesto App</h1>
    <p class="subtitle">Inicia sesion o crea una cuenta para continuar.</p>

    <div class="mode-buttons">
      <button
        type="button"
        class="mode-btn"
        [class.active]="modo === 'login'"
        (click)="cambiarModo('login')">
        Iniciar sesion
      </button>
      <button
        type="button"
        class="mode-btn"
        [class.active]="modo === 'registro'"
        (click)="cambiarModo('registro')">
        Registrarme
      </button>
    </div>

    <div class="field">
      <label for="email">Correo</label>
      <input
        id="email"
        type="email"
        class="form-control"
        [(ngModel)]="email"
        placeholder="correo@ejemplo.com">
    </div>

    <div class="field">
      <label for="password">Contrasena</label>
      <input
        id="password"
        type="password"
        class="form-control"
        [(ngModel)]="password"
        placeholder="Minimo 6 caracteres">
    </div>

    <button type="button" class="main-btn" (click)="continuar()">
      {{ modo === 'login' ? 'Entrar' : 'Crear cuenta' }}
    </button>

    <div class="alert alert-danger mt-3" *ngIf="error">
      {{ error }}
    </div>
  </div>
</div>
