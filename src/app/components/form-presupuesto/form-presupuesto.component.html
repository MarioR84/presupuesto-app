<div class="card p-4">
  <h4 class="mb-4">Agregar Presupuesto</h4>
  
  <div class="mb-3">
    <label for="nombre" class="form-label">Nombre</label>
    <input 
      type="text" 
      id="nombre"
      [(ngModel)]="nombre" 
      class="form-control"
      placeholder="Ej: Vivienda">
  </div>

  <div class="mb-3">
    <label for="mes" class="form-label">Mes</label>
    <select
      id="mes"
      [(ngModel)]="mes"
      class="form-select">
      <option value="">Selecciona un mes</option>
      <option *ngFor="let item of meses" [value]="item">{{ item }}</option>
    </select>
  </div>

  <div class="mb-3">
    <label for="monto" class="form-label">Monto</label>
    <input
      type="number"
      id="monto"
      [(ngModel)]="monto"
      class="form-control"
      min="1"
      step="1"
      placeholder="Ej: 5000">
  </div>

  <button class="btn btn-success w-100" (click)="guardar()">
    Guardar Presupuesto
  </button>

  <div class="alert alert-danger mt-3 mb-0" *ngIf="error">
    {{ error }}
  </div>

  <div class="alert alert-success mt-3 mb-0" *ngIf="exito">
    {{ exito }}
  </div>
</div>
